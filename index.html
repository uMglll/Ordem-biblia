<!DOCTYPE html>
<html lang="en">

    <title>Accessible Index</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Skip link for keyboard navigation -->
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <header>
        <h1>Welcome to the Accessible Site</h1>

            <ul>
                <li><a href="#section1">Section 1</a></li>
                <li><a href="#section2">Section 2</a></li>
                <li><a href="#section3">Section 3</a></li>
            </ul>
        </nav>
    </header>

    <main id="main-content">
        <section id="section1" tabindex="0">
            <h2>Section 1</h2>
            <p>This is the first section content.</p>
        </section>
        <section id="section2" tabindex="0">
            <h2>Section 2</h2>
            <p>This is the second section content.</p>
        </section>
        <section id="section3" tabindex="0">
            <h2>Section 3</h2>
            <p>This is the third section content.</p>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Accessible Site. All rights reserved.</p>
    </footer>
</body>
</html>
